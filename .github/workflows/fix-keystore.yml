name: Fix Keystore
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Generate fresh keystore and print base64
        run: |
          keytool -genkeypair \
            -alias upload \
            -keypass bgwrap123 \
            -keystore my-upload-key.jks \
            -storepass bgwrap123 \
            -dname "CN=BGWrap,O=BGWrap,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          echo "KEYSTORE_BASE64:"
          base64 -w 0 my-upload-key.jks
